name: Build libsuperuser

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Grant permission to gradlew
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build --no-daemon

      - name: Show generated jars
        run: find . -name "*.jar"

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: classes-jar
          path: |
            **/build/libs/*.jar
            **/outputs/**/*.jar
